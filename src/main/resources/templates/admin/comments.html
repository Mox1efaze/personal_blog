<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>评论管理 - 个人博客后台</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4"><i class="bi bi-chat-dots"></i> 评论管理</h2>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>作者</th>
                                <th>评论内容</th>
                                <th>文章</th>
                                <th>日期</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="comment : ${comments}">
                                <td>
                                    <strong th:text="${comment.authorName}">作者</strong><br>
                                    <small class="text-muted" th:text="${comment.authorEmail}">邮箱</small>
                                </td>
                                <td th:text="${comment.content}">评论...</td>
                                <td th:text="${comment.post.title}">文章</td>
                                <td th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">日期</td>
                                <td>
                                    <span class="badge" th:classappend="${comment.approved} ? 'bg-success' : 'bg-warning'"
                                          th:text="${comment.approved} ? '已审核' : '待审核'">状态</span>
                                </td>
                                <td>
                                    <div th:if="${!comment.approved}">
                                        <form th:action="@{/admin/comments/{id}/approve(id=${comment.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-success">
                                                <i class="bi bi-check"></i> 审核通过
                                            </button>
                                        </form>
                                    </div>
                                    <form th:action="@{/admin/comments/{id}/delete(id=${comment.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除吗？')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <p th:if="${comments.isEmpty()}" class="text-muted text-center py-3">暂无评论。</p>

                <nav th:if="${totalPages > 1}" aria-label="页面导航">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/comments(page=${currentPage - 1})}" aria-label="上一页">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                            class="page-item" 
                            th:classappend="${i == currentPage} ? 'active' : ''">
                            <a class="page-link" th:href="@{/admin/comments(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/comments(page=${currentPage + 1})}" aria-label="下一页">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
