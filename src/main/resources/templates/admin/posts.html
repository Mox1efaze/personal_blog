<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{admin/layout}">
<head>
    <title>文章管理 - 个人博客后台</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-file-earmark-text"></i> 文章管理</h2>
            <a th:href="@{/admin/posts/new}" class="btn btn-primary">
                <i class="bi bi-plus"></i> 新建文章
            </a>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>分类</th>
                                <th>日期</th>
                                <th>状态</th>
                                <th>浏览量</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="post : ${posts}">
                                <td th:text="${post.title}">标题</td>
                                <td th:text="${post.category?.name} ?: '-'">分类</td>
                                <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">日期</td>
                                <td>
                                    <span class="badge" th:classappend="${post.published} ? 'bg-success' : 'bg-warning'"
                                          th:text="${post.published} ? '已发布' : '草稿'">状态</span>
                                </td>
                                <td th:text="${post.views}">0</td>
                                <td>
                                    <a th:href="@{/admin/posts/{id}/edit(id=${post.id})}" class="btn btn-sm btn-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/post/{id}(id=${post.id})}" class="btn btn-sm btn-info" target="_blank">
                                        <i class="bi bi-eye"></i>
                                    </a>
                                    <form th:action="@{/admin/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('确定要删除吗？')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${totalPages > 1}" aria-label="页面导航">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/posts(page=${currentPage - 1})}" aria-label="上一页">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                            class="page-item" 
                            th:classappend="${i == currentPage} ? 'active' : ''">
                            <a class="page-link" th:href="@{/admin/posts(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/admin/posts(page=${currentPage + 1})}" aria-label="下一页">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
