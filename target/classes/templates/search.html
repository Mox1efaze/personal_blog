<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title th:text="'搜索: ' + ${keyword} + ' - 个人博客'">搜索 - 个人博客</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row">
            <div class="col-lg-8">
                <h2 class="mb-4">
                    <i class="bi bi-search"></i> 搜索结果: <span th:text="${keyword}">关键词</span>
                </h2>

                <div th:each="post : ${posts}" class="card post-card">
                    <div class="card-body">
                        <h3 class="card-title">
                            <a th:href="@{/post/{id}(id=${post.id})}" class="text-decoration-none text-dark" th:text="${post.title}">
                                文章标题
                            </a>
                        </h3>
                        <p class="card-text text-muted small">
                            <i class="bi bi-calendar"></i> 
                            <span th:text="${#temporals.format(post.publishedAt, 'yyyy-MM-dd HH:mm')}">日期</span>
                            <span class="ms-3"><i class="bi bi-eye"></i> <span th:text="${post.views}">0</span> 次浏览</span>
                        </p>
                        <p class="card-text" th:text="${post.summary}">摘要...</p>
                        <a th:href="@{/post/{id}(id=${post.id})}" class="btn btn-primary">阅读全文 <i class="bi bi-arrow-right"></i></a>
                    </div>
                </div>

                <div th:if="${posts.isEmpty()}" class="alert alert-info">
                    未找到包含 "<span th:text="${keyword}"></span>" 的文章。
                </div>

                <nav th:if="${totalPages > 1}" aria-label="页面导航">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${currentPage - 1})}" aria-label="上一页">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>
                        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                            class="page-item" 
                            th:classappend="${i == currentPage} ? 'active' : ''">
                            <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''">
                            <a class="page-link" th:href="@{/search(keyword=${keyword}, page=${currentPage + 1})}" aria-label="下一页">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

            <div class="col-lg-4">
                <div class="sidebar-widget">
                    <h5 class="widget-title mb-3"><i class="bi bi-folder"></i> 文章分类</h5>
                    <div class="list-group" th:if="${!categories.isEmpty()}">
                        <a th:each="category : ${categories}" 
                           th:href="@{/category/{id}(id=${category.id})}" 
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            <span th:text="${category.name}">分类</span>
                            <span class="badge bg-primary rounded-pill" th:text="${#lists.size(category.posts)}">0</span>
                        </a>
                    </div>
                </div>

                <div class="sidebar-widget">
                    <h5 class="widget-title mb-3"><i class="bi bi-tags"></i> 文章标签</h5>
                    <div th:if="${!tags.isEmpty()}">
                        <a th:each="tag : ${tags}" 
                           th:href="@{/tag/{id}(id=${tag.id})}" 
                           class="badge bg-secondary text-decoration-none tag-badge" th:text="${tag.name}">标签</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
