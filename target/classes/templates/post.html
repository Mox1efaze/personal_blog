<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <title th:text="${post.title} + ' - 个人博客'">文章标题 - 个人博客</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="row">
            <div class="col-lg-8">
                <article class="card post-card">
                    <div class="card-body">
                        <h1 class="card-title" th:text="${post.title}">文章标题</h1>
                        <p class="card-text text-muted small">
                            <i class="bi bi-calendar"></i> 
                            <span th:text="${#temporals.format(post.publishedAt, 'yyyy-MM-dd HH:mm')}">日期</span>
                            <span class="ms-3"><i class="bi bi-eye"></i> <span th:text="${post.views}">0</span> 次浏览</span>
                            <span class="ms-3" th:if="${post.category}">
                                <i class="bi bi-folder"></i> 
                                <a th:href="@{/category/{id}(id=${post.category.id})}" th:text="${post.category.name}" class="text-decoration-none">分类</a>
                            </span>
                        </p>
                        
                        <div th:if="${post.coverImage}">
                            <img th:src="${post.coverImage}" class="img-fluid mb-4 rounded" alt="封面">
                        </div>

                        <div class="post-content" th:utext="${post.content}">内容...</div>

                        <div th:if="${!post.tags.isEmpty()}" class="mt-4">
                            <h6><i class="bi bi-tags"></i> 标签:</h6>
                            <span th:each="tag : ${post.tags}">
                                <a th:href="@{/tag/{id}(id=${tag.id})}" class="badge bg-secondary text-decoration-none tag-badge" th:text="${tag.name}">标签</a>
                            </span>
                        </div>
                    </div>
                </article>

                <div class="card post-card mt-4">
                    <div class="card-body">
                        <h4><i class="bi bi-chat-dots"></i> 发表评论</h4>
                        <form th:action="@{/comment/add}" method="post">
                            <input type="hidden" name="postId" th:value="${post.id}">
                            <div class="mb-3">
                                <label class="form-label">昵称</label>
                                <input type="text" name="authorName" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">邮箱（选填）</label>
                                <input type="email" name="authorEmail" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">评论内容</label>
                                <textarea name="content" class="form-control" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">提交评论</button>
                        </form>
                    </div>
                </div>

                <div class="card post-card mt-4">
                    <div class="card-body">
                        <h4><i class="bi bi-chat-text"></i> 评论列表</h4>
                        <div th:if="${!post.comments.isEmpty()}">
                            <div th:each="comment : ${post.comments}" th:if="${comment.approved}" class="border-bottom pb-3 mb-3">
                                <div class="d-flex justify-content-between align-items-center">
                                    <h6 class="mb-0" th:text="${comment.authorName}">作者</h6>
                                    <small class="text-muted" th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}">日期</small>
                                </div>
                                <p class="mt-2" th:text="${comment.content}">评论内容...</p>
                            </div>
                        </div>
                        <div th:if="${post.comments.isEmpty()}" class="text-muted">暂无评论，快来抢沙发吧！</div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="sidebar-widget">
                    <h5 class="widget-title mb-3"><i class="bi bi-folder"></i> 文章分类</h5>
                    <div class="list-group" th:if="${!categories.isEmpty()}">
                        <a th:each="category : ${categories}" 
                           th:href="@{/category/{id}(id=${category.id})}" 
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            <span th:text="${category.name}">分类</span>
                            <span class="badge bg-primary rounded-pill" th:text="${#lists.size(category.posts)}">0</span>
                        </a>
                    </div>
                    <p th:if="${categories.isEmpty()}" class="text-muted">暂无分类。</p>
                </div>

                <div class="sidebar-widget">
                    <h5 class="widget-title mb-3"><i class="bi bi-tags"></i> 文章标签</h5>
                    <div th:if="${!tags.isEmpty()}">
                        <a th:each="tag : ${tags}" 
                           th:href="@{/tag/{id}(id=${tag.id})}" 
                           class="badge bg-secondary text-decoration-none tag-badge" th:text="${tag.name}">标签</a>
                    </div>
                    <p th:if="${tags.isEmpty()}" class="text-muted">暂无标签。</p>
                </div>

                <div class="sidebar-widget">
                    <h5 class="widget-title mb-3"><i class="bi bi-clock-history"></i> 最新文章</h5>
                    <div class="list-group" th:if="${!recentPosts.isEmpty()}">
                        <a th:each="p : ${recentPosts}" 
                           th:href="@{/post/{id}(id=${p.id})}" 
                           class="list-group-item list-group-item-action" th:text="${p.title}">
                            文章
                        </a>
                    </div>
                    <p th:if="${recentPosts.isEmpty()}" class="text-muted">暂无文章。</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
